<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Code Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            brand: { 
              50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 
              400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 
              800: '#075985', 900: '#0c4a6e', 950: '#082f49' 
            } 
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.15); }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .loader { border: 3px solid #1e293b; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-active { border-bottom: 2px solid #0ea5e9; color: #38bdf8; font-weight: 600; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; }
    .tab-inactive:hover { color: #94a3b8; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased min-h-screen">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="min-h-screen flex items-center justify-center bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-brand-900 via-slate-900 to-slate-950 p-4">
    <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl shadow-brand-900/30 fade-in">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-500/10 mb-3">
          <i class="fa-solid fa-server text-3xl text-brand-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">X-Code Management</h1>
        <p class="text-sm text-slate-400">PT Teknologi Server Indonesia</p>
      </div>

      <!-- TABS -->
      <div class="flex border-b border-slate-700 mb-6">
        <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2.5 text-sm font-medium tab-active transition-all">Masuk</button>
        <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-2.5 text-sm font-medium tab-inactive transition-all">Daftar</button>
        <button onclick="switchTab('forgot')" id="tab-forgot" class="flex-1 py-2.5 text-sm font-medium tab-inactive transition-all">Lupa PW</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="form-login" class="space-y-4 fade-in">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
          <input type="email" id="login-email" required placeholder="admin@xcode.co.id" 
            class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
          <input type="password" id="login-pass" required placeholder="••••••••" 
            class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-medium py-2.5 rounded-lg transition-all shadow-lg shadow-brand-500/20 flex items-center justify-center gap-2">
          <span id="btn-login-text">Masuk Sistem</span>
          <div id="btn-login-loader" class="loader hidden"></div>
        </button>
        <p class="text-xs text-center text-slate-500 mt-2">Belum punya akun? <button type="button" onclick="switchTab('register')" class="text-brand-400 hover:text-brand-300 font-medium">Daftar sekarang</button></p>
      </form>

      <!-- REGISTER FORM -->
      <form id="form-register" class="space-y-3 hidden fade-in">
        <input type="text" id="reg-name" required placeholder="Nama Lengkap" 
          class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500">
        <input type="email" id="reg-email" required placeholder="Email" 
          class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500">
        <input type="password" id="reg-pass" required placeholder="Password (min. 6 karakter)" 
          class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500">
        <select id="reg-role" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all text-slate-300">
          <option value="intern">Pemagang</option>
          <option value="supervisor">Supervisor</option>
        </select>
        <button type="submit" class="w-full bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-medium py-2.5 rounded-lg transition-all shadow-lg shadow-brand-500/20 flex items-center justify-center gap-2 mt-4">
          <span id="btn-reg-text">Daftar Sekarang</span>
          <div id="btn-reg-loader" class="loader hidden"></div>
        </button>
        <p class="text-xs text-center text-slate-500 mt-2">Sudah punya akun? <button type="button" onclick="switchTab('login')" class="text-brand-400 hover:text-brand-300 font-medium">Masuk</button></p>
      </form>

      <!-- FORGOT PASSWORD FORM -->
      <form id="form-forgot" class="space-y-4 hidden fade-in">
        <div id="step-email">
          <div class="mb-4">
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Email Terdaftar</label>
            <input type="email" id="forgot-email" required placeholder="email@xcode.co.id" 
              class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500">
          </div>
          <div class="bg-brand-500/10 border border-brand-500/20 rounded-lg p-3 mb-4">
            <p class="text-xs text-brand-300"><i class="fa-solid fa-info-circle mr-1"></i> Kode reset akan dikirim (cek terminal backend)</p>
          </div>
          <button type="submit" class="w-full bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-medium py-2.5 rounded-lg transition-all shadow-lg shadow-brand-500/20 flex items-center justify-center gap-2">
            <span id="btn-forgot-text">Kirim Kode Reset</span>
            <div id="btn-forgot-loader" class="loader hidden"></div>
          </button>
        </div>
        
        <div id="step-verify" class="hidden">
          <div class="mb-3">
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Kode Verifikasi (6 digit)</label>
            <input type="text" id="reset-code" maxlength="6" required placeholder="000000" 
              class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500 tracking-widest text-center font-mono">
          </div>
          <div class="mb-4">
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Password Baru</label>
            <input type="password" id="reset-new-pass" required placeholder="Min. 6 karakter" 
              class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 outline-none transition-all placeholder-slate-500">
          </div>
          <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white font-medium py-2.5 rounded-lg transition-all shadow-lg shadow-green-500/20 flex items-center justify-center gap-2">
            <span id="btn-reset-text">Reset Password</span>
            <div id="btn-reset-loader" class="loader hidden"></div>
          </button>
          <button type="button" onclick="resetForgotForm()" class="w-full mt-2 text-xs text-slate-400 hover:text-slate-300">Kembali</button>
        </div>
      </form>

      <p id="auth-msg" class="text-xs text-center mt-4 h-5 font-medium"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="hidden min-h-screen flex">
    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col fixed h-full z-20">
      <div class="p-6 border-b border-slate-800">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-brand-500/10 flex items-center justify-center">
            <i class="fa-solid fa-code text-brand-400"></i>
          </div>
          <div>
            <h2 class="font-bold text-white leading-tight">X-Code</h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-wider">PT Teknologi Server Indonesia</p>
          </div>
        </div>
      </div>

      <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
        <!-- ✅ Manajemen User (Hanya Admin/Superadmin) -->
        <button onclick="router('users')" id="nav-users" class="nav-item hidden w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="users">
            <i class="fa-solid fa-users-gear w-5"></i> Manajemen User
        </button>
        
        <!-- ✅ Dashboard (Semua role) -->
        <button onclick="router('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="dashboard">
          <i class="fa-solid fa-chart-pie w-5"></i> Dashboard
        </button>
        
        <!-- ✅ Data Pemagang (Supervisor + Admin/Superadmin) -->
        <button onclick="router('interns')" id="nav-interns" class="nav-item hidden w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="interns">
          <i class="fa-solid fa-users w-5"></i> Data Pemagang
        </button>
        
        <!-- ✅ Penugasan (Semua role - filter data di backend) -->
        <button onclick="router('tasks')" id="nav-tasks" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="tasks">
          <i class="fa-solid fa-list-check w-5"></i> Penugasan
        </button>
        
        <!-- ✅ Logbook (Semua role - filter data di backend) -->
        <button onclick="router('logbooks')" id="nav-logbooks" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="logbooks">
          <i class="fa-solid fa-book-open w-5"></i> Logbook
        </button>
        
        <!-- ✅ Absen (Intern: ajukan, Supervisor/Admin: konfirmasi) -->
        <button onclick="router('attendance')" id="nav-attendance" class="nav-item hidden w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="attendance">
          <i class="fa-solid fa-calendar-check w-5"></i> Absen
        </button>
        
        <!-- ✅ Penilaian (Supervisor + Admin/Superadmin) -->
        <button onclick="router('evaluations')" id="nav-evaluations" class="nav-item hidden w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="evaluations">
          <i class="fa-solid fa-star-half-stroke w-5"></i> Penilaian
        </button>
        
        <!-- ✅ Profil Saya (Semua role) -->
        <button onclick="router('profile')" id="nav-profile" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors" data-view="profile">
          <i class="fa-solid fa-user w-5"></i> Profil Saya
        </button>
      </nav>

      <div class="p-4 border-t border-slate-800">
        <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-red-400 hover:bg-red-500/10 transition-colors">
          <i class="fa-solid fa-right-from-bracket w-5"></i> Keluar
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 ml-64 min-h-screen flex flex-col">
      <!-- HEADER -->
      <header class="h-16 border-b border-slate-800 bg-slate-900/50 backdrop-blur flex items-center justify-between px-6 sticky top-0 z-10">
        <h1 id="page-title" class="text-lg font-semibold text-white">Dashboard</h1>
        <div class="flex items-center gap-4">
          <div class="text-right hidden sm:block">
            <p id="user-name" class="text-sm font-medium text-white">Loading...</p>
            <p id="user-role" class="text-xs text-brand-400 capitalize">Role</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-500 to-cyan-400 flex items-center justify-center text-white font-bold shadow-lg shadow-brand-500/20">
            <i class="fa-solid fa-user"></i>
          </div>
        </div>
      </header>

      <!-- CONTENT AREA -->
      <div id="content-area" class="p-6 flex-1 overflow-y-auto">
        <!-- Dynamic content -->
      </div>
    </main>
  </div>

  <script>
    'use strict';
    
    // ================= ERROR HANDLING =================
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('❌ Global error:', msg);
      console.error('File:', url);
      console.error('Line:', lineNo);
      return false;
    };

    // ================= SAFE JSON PARSER =================
    function safeJsonParse(str, defaultValue = {}) {
      if (!str) return defaultValue;
      try {
        return JSON.parse(str);
      } catch (e) {
        console.warn('Failed to parse JSON:', e);
        return defaultValue;
      }
    }

    // ================= CLEANUP LOCALSTORAGE =================
    (function cleanupLocalStorage() {
      try {
        const user = localStorage.getItem('user');
        if (user === 'undefined' || user === 'null') {
          localStorage.removeItem('user');
        }
        const token = localStorage.getItem('token');
        if (token === 'undefined' || token === 'null') {
          localStorage.removeItem('token');
        }
      } catch (e) {
        console.warn('LocalStorage cleanup error:', e);
      }
    })();

    // ================= STATE & CONFIG =================
    const API_BASE = 'http://127.0.0.1:3002/api';
    let state = { 
      token: localStorage.getItem('token'), 
      user: safeJsonParse(localStorage.getItem('user')), 
      view: 'dashboard' 
    };

    console.log('✅ State initialized:', state);

    // ================= AUTH FUNCTIONS =================
    function switchTab(tab) {
      ['login', 'register', 'forgot'].forEach(t => {
        const form = document.getElementById(`form-${t}`);
        const tabBtn = document.getElementById(`tab-${t}`);
        if (form) form.classList.toggle('hidden', t !== tab);
        if (tabBtn) {
          tabBtn.className = `flex-1 py-2.5 text-sm font-medium transition-all ${
            t === tab ? 'tab-active' : 'tab-inactive'
          }`;
        }
      });
      const msgEl = document.getElementById('auth-msg');
      if (msgEl) msgEl.textContent = '';
      if(tab === 'forgot') {
        const stepEmail = document.getElementById('step-email');
        const stepVerify = document.getElementById('step-verify');
        if (stepEmail) stepEmail.classList.remove('hidden');
        if (stepVerify) stepVerify.classList.add('hidden');
      }
    }

    function resetForgotForm() {
      const stepEmail = document.getElementById('step-email');
      const stepVerify = document.getElementById('step-verify');
      const resetCode = document.getElementById('reset-code');
      const resetNewPass = document.getElementById('reset-new-pass');
      const authMsg = document.getElementById('auth-msg');
      
      if (stepEmail) stepEmail.classList.remove('hidden');
      if (stepVerify) stepVerify.classList.add('hidden');
      if (resetCode) resetCode.value = '';
      if (resetNewPass) resetNewPass.value = '';
      if (authMsg) authMsg.textContent = '';
    }

    function showAuthMsg(msg, type='error') {
      const el = document.getElementById('auth-msg');
      if (!el) return;
      el.textContent = msg;
      el.className = `text-xs text-center mt-4 h-5 font-medium ${
        type === 'success' ? 'text-green-400' : 'text-red-400'
      }`;
    }

    // ✅ ENHANCED: handleAuth dengan debug logging
    async function handleAuth(e, url, body, btnTextId, btnLoaderId, successMsg) {
      e.preventDefault();
      
      const btnText = document.getElementById(btnTextId);
      const btnLoader = document.getElementById(btnLoaderId);
      
      if (btnText) btnText.classList.add('hidden');
      if (btnLoader) btnLoader.classList.remove('hidden');
      
      const authMsg = document.getElementById('auth-msg');
      if (authMsg) authMsg.textContent = '';
      
      try {
        console.log('📤 Sending request to:', `${API_BASE}${url}`);
        console.log('📦 Request body:', body);
        
        const res = await fetch(`${API_BASE}${url}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        console.log('📥 Response status:', res.status);
        console.log('📥 Response headers:', [...res.headers.entries()]);
        
        // Baca response text dulu untuk debug
        const responseText = await res.text();
        console.log('📥 Raw response:', responseText);
        
        if (!res.ok) {
          try {
            const err = JSON.parse(responseText);
            throw new Error(err.error || `Server error: ${res.status}`);
          } catch (parseErr) {
            throw new Error(`Server error: ${res.status} - ${responseText.slice(0, 100)}`);
          }
        }
        
        // Parse JSON
        let data;
        try {
          data = JSON.parse(responseText);
          console.log('✅ Parsed JSON:', data);
        } catch (parseErr) {
          console.error('❌ Failed to parse JSON:', parseErr);
          throw new Error('Response bukan JSON yang valid');
        }
        
        if (successMsg === 'login') {
          // ✅ Validasi response login
          if (!data.token || !data.user) {
            console.error('❌ Login response missing token or user:', data);
            throw new Error('Response login tidak valid. Hubungi admin.');
          }
          
          console.log('✅ Login successful, storing data...');
          
          // ✅ Simpan ke localStorage dengan try-catch
          try {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            console.log('✅ Saved to localStorage');
            
            // ✅ Update state
            state.token = data.token;
            state.user = data.user;
            console.log('✅ State updated:', state);
            
            // ✅ Redirect ke dashboard
            window.history.replaceState({}, '', '/');
            console.log('✅ History replaced, calling initApp...');
            initApp();
          } catch (storageErr) {
            console.error('❌ Failed to save to localStorage:', storageErr);
            alert('❌ Gagal menyimpan sesi login. Coba gunakan browser lain atau non-incognito mode.');
          }
        } else {
          showAuthMsg(successMsg, 'success');
          if (url.includes('forgot-password')) {
            setTimeout(() => {
              const stepEmail = document.getElementById('step-email');
              const stepVerify = document.getElementById('step-verify');
              if (stepEmail) stepEmail.classList.add('hidden');
              if (stepVerify) stepVerify.classList.remove('hidden');
            }, 1000);
          } else if (url.includes('reset-password')) {
            setTimeout(() => {
              switchTab('login');
              const loginEmail = document.getElementById('login-email');
              const forgotEmail = document.getElementById('forgot-email');
              if (loginEmail && forgotEmail) {
                loginEmail.value = forgotEmail.value;
              }
            }, 1500);
          }
        }
      } catch (err) {
        console.error('❌ Auth error:', err);
        showAuthMsg(err.message);
      } finally {
        if (btnText) btnText.classList.remove('hidden');
        if (btnLoader) btnLoader.classList.add('hidden');
      }
    }

    // ================= APP FUNCTIONS =================
    function initApp() {
      console.log('🔧 initApp called, token exists:', !!state.token);
      
      const authScreen = document.getElementById('auth-screen');
      const appScreen = document.getElementById('app-screen');
      
      if (!authScreen || !appScreen) {
        console.error('❌ auth-screen or app-screen not found!');
        return;
      }
      
      if (!state.token) {
        console.log('🔒 No token, showing auth screen');
        if (window.location.search || window.location.pathname !== '/') {
          window.history.replaceState({}, '', '/');
        }
        authScreen.classList.remove('hidden');
        appScreen.classList.add('hidden');
        return;
      }
      
      console.log('✅ Token found, showing app screen');
      authScreen.classList.add('hidden');
      appScreen.classList.remove('hidden');
      
      const userName = document.getElementById('user-name');
      const userRole = document.getElementById('user-role');
      if (userName) userName.textContent = state.user.full_name || 'User';
      if (userRole) userRole.textContent = state.user.role || 'intern';

      // RBAC: Tampilkan/sembunyikan menu berdasarkan role
      const role = state.user.role;
      
      const navUsers = document.getElementById('nav-users');
      const navDashboard = document.getElementById('nav-dashboard');
      const navInterns = document.getElementById('nav-interns');
      const navTasks = document.getElementById('nav-tasks');
      const navLogbooks = document.getElementById('nav-logbooks');
      const navAttendance = document.getElementById('nav-attendance');
      const navEvaluations = document.getElementById('nav-evaluations');
      const navProfile = document.getElementById('nav-profile');
      
      // Reset: sembunyikan menu role-specific dulu
      [navUsers, navInterns, navAttendance, navEvaluations].forEach(el => {
        if (el) el.classList.add('hidden');
      });
      // Tampilkan menu untuk semua role
      [navDashboard, navTasks, navLogbooks, navProfile].forEach(el => {
        if (el) el.classList.remove('hidden');
      });
      
      if (role === 'superadmin' || role === 'admin') {
        console.log('🔐 Role: Admin/Superadmin');
        if (navUsers) navUsers.classList.remove('hidden');
        if (navInterns) navInterns.classList.remove('hidden');
        if (navAttendance) navAttendance.classList.remove('hidden');

    function logout() {
      console.log('🚪 Logging out...');
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      state = { token: null, user: {}, view: 'dashboard' };
      window.history.replaceState({}, '', '/');
      initApp();
    }

    // ================= API HELPER =================
    async function api(endpoint, options = {}) {
      const headers = { 
        'Content-Type': 'application/json',
        ...(state.token ? { 'Authorization': `Bearer ${state.token}` } : {})
      };
      console.log('🔌 API call:', endpoint);
      
      try {
        const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        
        if (res.status === 401) { 
          console.log('🔐 Unauthorized, logging out');
          logout(); 
          return null; 
        }
        
        if (!res.ok) {
          const errText = await res.text().catch(() => 'Unknown error');
          console.error('❌ API error:', res.status, errText);
          throw new Error(`API Error: ${res.status}`);
        }
        
        const jsonData = await res.json();
        console.log('✅ API response:', jsonData);
        
        if (jsonData && typeof jsonData === 'object' && !Array.isArray(jsonData) && Array.isArray(jsonData.data)) {
          return jsonData.data;
        }
        if (jsonData === null || jsonData === undefined) return [];
        
        return jsonData;
      } catch (err) {
        console.error('❌ API helper error:', err);
        throw err;
      }
    }

    async function downloadPdf(internId) {
      try {
        const res = await fetch(`${API_BASE}/reports/intern/${internId}/pdf`, {
          headers: { 'Authorization': `Bearer ${state.token}` }
        });
        if (!res.ok) throw new Error('Gagal generate PDF');
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `laporan_${internId}.pdf`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      } catch (err) {
        console.error('PDF download error:', err);
        alert('Gagal download PDF: ' + err.message);
      }
    }

    // ================= ROUTER & VIEWS =================
    function router(view) {
      console.log('🧭 Router called with view:', view);
      state.view = view;
      
      document.querySelectorAll('.nav-item').forEach(el => {
        const isActive = el.dataset.view === view;
        el.classList.toggle('bg-slate-800', isActive);
        el.classList.toggle('text-white', isActive);
      });
      
      const titles = {
        'dashboard': 'Dashboard',
        'interns': 'Data Pemagang',
        'tasks': 'Penugasan',
        'logbooks': 'Logbook',
        'evaluations': 'Penilaian',
        'users': 'Manajemen User',
        'profile': 'Profil Saya',
        'attendance': 'Absen'
      };
      const pageTitle = document.getElementById('page-title');
      if (pageTitle) pageTitle.textContent = titles[view] || 'Dashboard';
      
      const content = document.getElementById('content-area');
      if (!content) {
        console.error('❌ content-area not found!');
        return;
      }
      content.innerHTML = `<div class="flex justify-center items-center h-64"><div class="loader"></div></div>`;
      
      setTimeout(() => {
        try {
          switch(view) {
            case 'dashboard': renderDashboard(content); break;
            case 'interns': renderInterns(content); break;
            case 'tasks': renderTasks(content); break;
            case 'logbooks': renderLogbooks(content); break;
            case 'evaluations': renderEvaluations(content); break;
            case 'users': renderUsers(content); break;
            case 'profile': renderProfile(content); break;
            case 'attendance': renderAttendance(content); break;
            default: renderDashboard(content);
          }
        } catch (err) {
          console.error('❌ Router error:', err);
          content.innerHTML = `<div class="glass rounded-xl p-6 fade-in"><p class="text-red-400">Error: ${err.message}</p></div>`;
        }

      const role = state.user.role;
      
      try {
        const attendances = await api('/attendances');
        console.log('📋 Attendance data:', attendances);
        
        if (role === 'intern') {
          container.innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 fade-in">
              <div class="glass rounded-xl p-6">
                <h3 class="text-lg font-semibold text-white mb-4">📝 Check-In Absen</h3>
                <form id="attendance-form" class="space-y-4">
                  <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Tanggal</label>
                    <input type="date" id="attendance-date" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none">
                  </div>
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-xs font-medium text-slate-400 mb-1">Jam Check-In</label>
                      <input type="time" id="attendance-time" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none">
                    </div>
                    <div>
                      <label class="block text-xs font-medium text-slate-400 mb-1">Jam Mulai Kerja</label>
                      <input type="time" id="start-time" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none">
                    </div>
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Status Kehadiran</label>
                    <select id="attendance-status" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none">
                      <option value="Hadir">Hadir</option>
                      <option value="Izin">Izin</option>
                      <option value="Sakit">Sakit</option>
                      <option value="Alfa">Alfa</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Keterangan (Opsional)</label>
                    <textarea id="attendance-desc" rows="3" placeholder="Contoh: Sakit flu, Izin keluarga, dll" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/50 outline-none resize-none"></textarea>
                  </div>
                  <button type="submit" class="w-full bg-brand-600 hover:bg-brand-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
                    📤 Check-In Absen
                  </button>
                </form>
              </div>
              
              <div class="glass rounded-xl p-6">
                <h3 class="text-lg font-semibold text-white mb-4">📜 Riwayat Absen Saya</h3>
                ${!attendances || attendances.length === 0 ? '<p class="text-slate-400 text-center py-8">Belum ada absen</p>' : `
                  <div class="space-y-3 max-h-96 overflow-y-auto">
                    ${attendances.map(a => {
                      const statusColor = a.status === 'Hadir' ? 'bg-green-500/10 text-green-400 border-green-500' : 
                                         a.status === 'Izin' || a.status === 'Sakit' ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500' : 
                                         'bg-red-500/10 text-red-400 border-red-500';
                      const checkInTime = a.attendance_time || '-';
                      const startTime = a.start_time || '-';
                      const endTime = a.end_time || '-';
                      
                      return `
                        <div class="bg-slate-800/30 p-4 rounded-lg border-l-4 ${statusColor}">
                          <div class="flex justify-between items-start mb-2">
                            <div>
                              <p class="text-sm font-medium text-white">${a.date}</p>
                              <div class="flex flex-wrap gap-2 mt-1 text-xs text-slate-400">
                                <span>🕐 Check-In: ${checkInTime}</span>
                                ${startTime !== '-' ? `<span>▶️ Mulai: ${startTime}</span>` : ''}
                                ${endTime !== '-' ? `<span>⏹️ Selesai: ${endTime}</span>` : ''}
                              </div>
                            </div>
                            <span class="px-2 py-1 rounded text-xs font-medium border ${statusColor}">${a.status}</span>
                          </div>
                          ${a.description ? `<p class="text-xs text-slate-400 mt-2">${a.description}</p>` : ''}
                          ${a.confirmed_at ? `<p class="text-xs text-slate-500 mt-2">✅ Dikonfirmasi: ${new Date(a.confirmed_at).toLocaleString('id-ID')}</p>` : ''}
                          ${!a.end_time && a.status === 'Hadir' ? `<button onclick="checkOut('${a.id}')" class="mt-2 text-xs bg-orange-500/20 text-orange-400 px-3 py-1 rounded hover:bg-orange-500/30 transition-colors">⏹️ Check-Out</button>` : ''}
                        </div>
                      `;
                    }).join('')}
                  </div>
                `}
              </div>
            </div>
          `;
          
          document.getElementById('attendance-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
              const interns = await api('/interns');
              console.log('Interns data:', interns);
              
              if (!interns || !Array.isArray(interns)) {
                alert('❌ Data pemagang tidak valid. Hubungi admin.');
                return;
              }
              
              const myIntern = interns.find(i => i?.user_id === state.user.id);
              if (!myIntern) { 
                alert('❌ Data pemagang tidak ditemukan. Hubungi admin.'); 
                return; 
              }
              
              const dateValue = document.getElementById('attendance-date').value;
              const timeValue = document.getElementById('attendance-time').value;
              const startTimeValue = document.getElementById('start-time').value;
              const statusValue = document.getElementById('attendance-status').value;
              const descValue = document.getElementById('attendance-desc').value;
              
              await api('/attendances', {
                method: 'POST',
                body: JSON.stringify({
                  intern_id: myIntern.id,
                  date: dateValue,
                  attendance_time: timeValue,
                  start_time: startTimeValue || null,
                  end_time: null,
                  description: descValue || null,
                  status: statusValue
                })
              });
              
              alert('✅ Check-in berhasil! Jangan lupa check-out setelah selesai kerja.');
              renderAttendance(container);
            } catch (err) { 
              alert('❌ Gagal check-in: ' + err.message); 
            }
          });
          
        } else {
          container.innerHTML = `
            <div class="glass rounded-xl p-6 fade-in">
              <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-white">📋 Konfirmasi Absen</h3>
                <span class="text-sm text-slate-400">${(attendances || []).filter(a => a.status === 'pending').length} pending</span>
              </div>
              ${!attendances || attendances.length === 0 ? '<p class="text-slate-400 text-center py-8">Tidak ada data absen</p>' : `
                <div class="overflow-x-auto">
                  <table class="w-full text-sm text-left">
                    <thead class="bg-slate-800/50 text-xs uppercase text-slate-400">
                      <tr>
                        <th class="px-4 py-3">Tanggal</th>
                        <th class="px-4 py-3">Check-In</th>
                        <th class="px-4 py-3">Mulai</th>
                        <th class="px-4 py-3">Selesai</th>
                        <th class="px-4 py-3">Pemagang</th>
                        <th class="px-4 py-3">Status</th>
                        <th class="px-4 py-3">Keterangan</th>
                        <th class="px-4 py-3 text-right">Aksi</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-800">
                      ${attendances.map(a => {
                        const statusDisplay = a.status || 'pending';
                        return `
                          <tr class="hover:bg-slate-800/30 transition-colors">
                            <td class="px-4 py-3 text-slate-300">${a.date}</td>
                            <td class="px-4 py-3 text-slate-300">${a.attendance_time || '-'}</td>
                            <td class="px-4 py-3 text-slate-300">${a.start_time || '-'}</td>
                            <td class="px-4 py-3 text-slate-300">${a.end_time || '-'}</td>
                            <td class="px-4 py-3 text-slate-300">${a.intern_id?.slice(0,8)}...</td>
                            <td class="px-4 py-3">
                              <span class="px-2 py-1 rounded text-xs font-medium ${
                                statusDisplay === 'Hadir' ? 'bg-green-500/10 text-green-400' : 
                                statusDisplay === 'Izin' || statusDisplay === 'Sakit' ? 'bg-yellow-500/10 text-yellow-400' : 'bg-red-500/10 text-red-400'
                              }">${statusDisplay}</span>
                            </td>
                            <td class="px-4 py-3 text-slate-300">${a.description || '-'}</td>
                            <td class="px-4 py-3 text-right space-x-2">
                              ${statusDisplay === 'pending' ? `
                                <button onclick="confirmAttendance('${a.id}', 'approved')" class="text-green-400 hover:text-green-300 text-xs" title="Setujui">
                                  <i class="fa-solid fa-check"></i>
                                </button>
                                <button onclick="confirmAttendance('${a.id}', 'rejected')" class="text-red-400 hover:text-red-300 text-xs" title="Tolak">
                                  <i class="fa-solid fa-xmark"></i>
                                </button>
                              ` : '<span class="text-slate-500 text-xs">-</span>'}
                            </td>
                          </tr>
                        `;
                      }).join('')}
                    </tbody>
                  </table>
                </div>
              `}
            </div>
          `;
        }
      } catch (err) {
        console.error('❌ Attendance error:', err);
        container.innerHTML = `
          <div class="glass rounded-xl p-6 fade-in">
            <p class="text-red-400">Gagal memuat data absen: ${err.message}</p>
            <button onclick="router('attendance')" class="mt-3 text-brand-400 hover:text-brand-300 text-sm">
              🔁 Coba Lagi
            </button>
          </div>
        `;
      }
    }

    // ✅ Helper: Check-Out (Update end_time)
    async function checkOut(attendanceId) {
      if (!confirm('Yakin ingin check-out? Pastikan pekerjaan sudah selesai.')) return;
      
      const now = new Date();
      const endTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      
      try {
        await api(`/attendances/${attendanceId}/end-time`, {
          method: 'PUT',
          body: JSON.stringify({ end_time: endTime })
        });
        
        alert(`✅ Check-out berhasil! Waktu selesai: ${endTime}`);
        router('attendance');
      } catch (err) { 
        alert('❌ Gagal check-out: ' + err.message); 
      }
    }

    // ✅ Helper: Konfirmasi absen (hanya untuk supervisor/admin)
    async function confirmAttendance(attendanceId, status) {
      if (!confirm(`Yakin ingin ${status === 'approved' ? 'menyetujui' : 'menolak'} absen ini?`)) return;
      try {
        await api(`/attendances/${attendanceId}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
        alert(`✅ Absen berhasil ${status === 'approved' ? 'disetujui' : 'ditolak'}!`);
        router('attendance');
      } catch (err) { alert('❌ Gagal konfirmasi absen: ' + err.message); }
    }

    // Helper functions untuk modal user
    function showCreateUserModal() { alert('Fitur tambah user via form akan ditambahkan segera! Untuk sekarang, gunakan endpoint API langsung atau Postman.'); }
    function closeCreateUserModal() {}
    async function deleteUser(userId) { if (!confirm('Yakin ingin menghapus user ini?')) return; try { await api(`/users/${userId}`, { method: 'DELETE' }); router('users'); } catch (err) { alert('Gagal menghapus: ' + err.message); } }
    function editUser(userId) { alert('Fitur edit user akan datang! (Untuk demo, hapus lalu buat baru via API)'); }

    // ================= INIT =================
    console.log('🚀 Script loaded, initializing...');

    // Pastikan DOM sudah siap sebelum init
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        console.log('📄 DOM loaded via event, calling initApp');
        initApp();
      });
    } else {
      console.log('📄 DOM already ready, calling initApp');
      initApp();
    }
  </script>
</body>
</html>
